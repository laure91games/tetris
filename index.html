<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }

    #game-container { display: flex; gap: 24px; align-items: flex-start; }

    #board-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.3em;
      color: #e94560;
      text-shadow: 0 0 20px #e94560aa;
    }

    canvas {
      border: 2px solid #e94560;
      box-shadow: 0 0 30px #e9456055, inset 0 0 30px #00000088;
      background: #0a0a1a;
    }

    #music-btn {
      padding: 5px 14px; background: transparent; color: #555;
      border: 1px solid #333; border-radius: 4px; font-size: 0.7rem;
      font-family: 'Courier New', monospace; letter-spacing: 0.1em;
      cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    #music-btn:hover { color: #aaa; border-color: #666; }
    #music-btn.muted { color: #e94560; border-color: #e94560; }

    #side-panel { display: flex; flex-direction: column; gap: 16px; min-width: 140px; }

    .panel-box {
      border: 2px solid #16213e;
      background: #16213e;
      border-radius: 6px;
      padding: 12px;
    }
    .panel-box h3 {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .panel-box .value { font-size: 1.6rem; color: #e94560; font-weight: bold; }

    #next-canvas, #hold-canvas { display: block; background: #0a0a1a; border: 1px solid #333; }
    #hold-box.blocked { opacity: 0.4; }

    /* Challenge / Boss box */
    #challenge-box { display: none; }
    #challenge-box.visible { display: block; }
    #challenge-title { font-size: 0.75rem; color: #f0a000; margin-bottom: 4px; }
    #challenge-obj { font-size: 0.65rem; color: #aaa; margin-bottom: 8px; line-height: 1.4; }
    #challenge-progress-bar { height: 6px; background: #0a0a1a; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    #challenge-progress-fill { height: 100%; background: #f0a000; border-radius: 3px; transition: width 0.3s; width: 0%; }
    #challenge-progress-text { font-size: 0.7rem; color: #f0a000; text-align: right; }
    #challenge-timer { font-size: 1.1rem; color: #e94560; font-weight: bold; margin-top: 4px; }

    /* Boss mode overrides */
    #challenge-box.boss-mode #challenge-title { color: #e94560; }
    #challenge-box.boss-mode h3 { color: #e94560; }
    #challenge-box.boss-mode #challenge-progress-fill { background: #e94560; transition: width 0.5s; }
    #challenge-box.boss-mode #challenge-progress-text { color: #e94560; }
    #boss-attack-warning {
      font-size: 0.75rem; font-weight: bold; color: #e94560;
      text-align: center; min-height: 1.1em; margin-top: 4px;
    }
    #boss-attack-warning.active { animation: boss-flash 0.4s infinite; }
    @keyframes boss-flash { 50% { opacity: 0.2; } }

    /* Controls */
    #controls { font-size: 0.7rem; color: #666; }
    #controls table { width: 100%; border-collapse: collapse; }
    #controls td { padding: 3px 0; vertical-align: middle; }
    #controls td:first-child { color: #aaa; text-align: right; padding-right: 6px; }
    #edit-controls-btn {
      margin-top: 10px; width: 100%; padding: 6px 0;
      background: transparent; color: #555; border: 1px solid #333; border-radius: 4px;
      font-size: 0.65rem; font-family: 'Courier New', monospace; letter-spacing: 0.1em;
      cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    #edit-controls-btn:hover { color: #aaa; border-color: #666; }

    /* Keybind modal */
    #keybind-modal { display: none; position: fixed; inset: 0; background: #000000dd; justify-content: center; align-items: center; z-index: 20; }
    #keybind-modal.open { display: flex; }
    #keybind-panel { background: #16213e; border: 2px solid #e94560; border-radius: 8px; padding: 24px; min-width: 280px; }
    #keybind-panel h2 { font-size: 1rem; letter-spacing: 0.2em; color: #e94560; margin-bottom: 16px; text-align: center; }
    .keybind-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #ffffff0a; font-size: 0.8rem; }
    .keybind-row .action-name { color: #aaa; }
    .keybind-btn { min-width: 80px; padding: 4px 10px; background: #0a0a1a; color: #eee; border: 1px solid #444; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.75rem; cursor: pointer; text-align: center; transition: border-color 0.15s, color 0.15s; }
    .keybind-btn:hover { border-color: #e94560; color: #e94560; }
    .keybind-btn.listening { border-color: #f0a000; color: #f0a000; animation: blink 0.7s infinite; }
    @keyframes blink { 50% { opacity: 0.4; } }
    #keybind-close { margin-top: 16px; width: 100%; padding: 8px 0; background: #e94560; color: white; border: none; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.85rem; letter-spacing: 0.1em; cursor: pointer; }
    #keybind-close:hover { background: #c73050; }
    #keybind-conflict { font-size: 0.65rem; color: #e94560; min-height: 1.2em; text-align: center; margin-top: 8px; }

    /* Main overlay */
    #overlay { position: fixed; inset: 0; background: #000000cc; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 14px; z-index: 10; }
    #overlay h2 { font-size: 2.5rem; color: #e94560; text-shadow: 0 0 30px #e94560; letter-spacing: 0.2em; }
    #overlay p { color: #aaa; font-size: 0.95rem; text-align: center; max-width: 360px; line-height: 1.6; }

    .ov-btn { padding: 12px 32px; background: #e94560; color: white; border: none; border-radius: 4px; font-size: 1rem; font-family: 'Courier New', monospace; letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s; }
    .ov-btn:hover { background: #c73050; }
    .ov-btn.secondary { background: transparent; border: 1px solid #555; color: #aaa; }
    .ov-btn.secondary:hover { border-color: #aaa; color: #eee; background: transparent; }

    #final-score { font-size: 1.2rem; color: #fff; }

    /* Chapter / Boss select scroll */
    #chapter-scroll { max-height: 420px; overflow-y: auto; width: 360px; padding-right: 4px; }
    #chapter-scroll::-webkit-scrollbar { width: 4px; }
    #chapter-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .diff-section { margin-bottom: 12px; }
    .diff-header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; margin-bottom: 6px;
      border-radius: 4px; font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; font-weight: bold;
    }
    .diff-header .diff-badge { font-size: 0.65rem; margin-left: auto; color: inherit; opacity: 0.7; }
    .diff-header.easy  { background: #00c87815; color: #00c878; border-left: 3px solid #00c878; }
    .diff-header.medium { background: #f0a00015; color: #f0a000; border-left: 3px solid #f0a000; }
    .diff-header.hard  { background: #e9456015; color: #e94560; border-left: 3px solid #e94560; }
    .diff-header.locked-section { opacity: 0.4; }

    .chapter-card {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #16213e; border: 1px solid #222;
      border-radius: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
      margin-bottom: 6px;
    }
    .chapter-card:hover:not(.locked) { border-color: #e94560; background: #1e2d4e; }
    .chapter-card.locked { opacity: 0.3; cursor: default; }
    .chapter-card.completed { border-color: #00c87855; }
    .chapter-card.easy.completed   { border-color: #00c87888; }
    .chapter-card.medium.completed { border-color: #f0a00088; }
    .chapter-card.hard.completed   { border-color: #e9456088; }

    .chapter-num { font-size: 1rem; min-width: 24px; text-align: center; color: #555; }
    .chapter-card.easy   .chapter-num { color: #00c878; }
    .chapter-card.medium .chapter-num { color: #f0a000; }
    .chapter-card.hard   .chapter-num { color: #e94560; }
    .chapter-card.locked .chapter-num { color: #333; }

    .chapter-info { flex: 1; }
    .chapter-info .ch-title { font-size: 0.85rem; color: #eee; margin-bottom: 2px; }
    .chapter-info .ch-obj { font-size: 0.65rem; color: #555; }
    .chapter-card.completed .ch-obj { color: #666; }
    .chapter-badge { font-size: 0.9rem; min-width: 20px; text-align: center; }

    /* Boss cards */
    .boss-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: #1a0a0a; border: 1px solid #3a1020;
      border-radius: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
      margin-bottom: 8px;
    }
    .boss-card:hover:not(.locked) { border-color: #e94560; background: #2a1020; }
    .boss-card.locked { opacity: 0.3; cursor: default; }
    .boss-card.completed { border-color: #e9456088; }
    .boss-icon { font-size: 1.5rem; min-width: 32px; text-align: center; }
    .boss-info { flex: 1; }
    .boss-info .b-name { font-size: 0.9rem; color: #e94560; margin-bottom: 2px; font-weight: bold; }
    .boss-info .b-subtitle { font-size: 0.65rem; color: #888; margin-bottom: 4px; }
    .boss-info .b-mechanic { font-size: 0.6rem; color: #555; }
    .boss-card.completed .b-name { color: #c73050; }
    .boss-badge { font-size: 0.9rem; min-width: 20px; text-align: center; }
    .boss-hp-preview { font-size: 0.65rem; color: #e94560; opacity: 0.7; }

    /* Chapter intro */
    .diff-pill {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px; font-weight: bold;
    }
    .diff-pill.easy   { background: #00c87820; color: #00c878; border: 1px solid #00c878; }
    .diff-pill.medium { background: #f0a00020; color: #f0a000; border: 1px solid #f0a000; }
    .diff-pill.hard   { background: #e9456020; color: #e94560; border: 1px solid #e94560; }
    .diff-pill.boss   { background: #e9456030; color: #ff6080; border: 1px solid #e94560; letter-spacing: 0.3em; }

    #chapter-intro-title { font-size: 1.6rem; color: #eee; letter-spacing: 0.1em; margin: 6px 0 12px; }
    #chapter-intro-narrative { color: #888; font-size: 0.85rem; text-align: center; max-width: 300px; line-height: 1.7; margin-bottom: 4px; }
    .objective-badge { background: #0a0a1a; border: 1px solid #f0a000; border-radius: 4px; padding: 8px 20px; font-size: 0.8rem; color: #f0a000; text-align: center; }
    .boss-stats-badge {
      background: #0a0a1a; border: 1px solid #e94560; border-radius: 4px;
      padding: 10px 20px; font-size: 0.75rem; color: #e94560; text-align: center; line-height: 2;
    }
    .boss-stats-badge span { color: #aaa; }

    /* Result */
    .result-icon { font-size: 3rem; }
    .result-stats { font-size: 0.8rem; color: #666; text-align: center; line-height: 2; }
    .result-stats span { color: #aaa; }

    /* Profiles */
    #profile-list { display: flex; flex-direction: column; gap: 8px; width: 300px; max-height: 280px; overflow-y: auto; }
    #profile-list::-webkit-scrollbar { width: 4px; }
    #profile-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .profile-card { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #16213e; border: 1px solid #222; border-radius: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .profile-card:hover { border-color: #e94560; background: #1e2d4e; }
    .profile-avatar { width: 36px; height: 36px; border-radius: 50%; background: #e94560; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: bold; color: white; flex-shrink: 0; }
    .profile-info { flex: 1; }
    .profile-info .p-name { font-size: 0.9rem; color: #eee; }
    .profile-info .p-stats { font-size: 0.65rem; color: #555; margin-top: 2px; }
    .profile-delete { background: none; border: none; color: #333; font-size: 1rem; cursor: pointer; padding: 4px; transition: color 0.15s; }
    .profile-delete:hover { color: #e94560; }

    .name-input { padding: 10px 14px; background: #0a0a1a; border: 1px solid #444; border-radius: 4px; color: #eee; font-family: 'Courier New', monospace; font-size: 1rem; width: 240px; text-align: center; letter-spacing: 0.1em; outline: none; transition: border-color 0.15s; }
    .name-input:focus { border-color: #e94560; }
    .name-input::placeholder { color: #444; }
    .input-error { font-size: 0.7rem; color: #e94560; min-height: 1em; }

    /* Player box */
    #player-box { cursor: pointer; transition: border-color 0.15s; }
    #player-box:hover { border-color: #e94560; }
    #player-name-display { font-size: 1rem; color: #eee; font-weight: bold; }
    #player-best { font-size: 0.65rem; color: #555; margin-top: 2px; }
  </style>
</head>
<body>

<div id="game-container">
  <div id="board-wrapper">
    <h1>TETRIS</h1>
    <canvas id="board" width="300" height="600"></canvas>
    <button id="music-btn">🔊 MÚSICA</button>
  </div>
  <div id="side-panel">
    <div class="panel-box" id="player-box" title="Cambiar jugador">
      <h3>Jugador</h3>
      <div id="player-name-display">—</div>
      <div id="player-best"></div>
    </div>
    <div class="panel-box">
      <h3>Puntos</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel-box" id="level-box">
      <h3>Nivel</h3>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel-box">
      <h3>Líneas</h3>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel-box" id="challenge-box">
      <h3 id="challenge-box-label">Reto</h3>
      <div id="challenge-title"></div>
      <div id="challenge-obj"></div>
      <div id="challenge-progress-bar"><div id="challenge-progress-fill"></div></div>
      <div id="challenge-progress-text"></div>
      <div id="challenge-timer"></div>
      <div id="boss-attack-warning"></div>
    </div>
    <div class="panel-box" id="hold-box">
      <h3>Guardada</h3>
      <canvas id="hold-canvas" width="120" height="120"></canvas>
    </div>
    <div class="panel-box">
      <h3>Siguiente</h3>
      <canvas id="next-canvas" width="120" height="120"></canvas>
    </div>
    <div class="panel-box" id="controls">
      <h3>Controles</h3>
      <table id="controls-table"></table>
      <button id="edit-controls-btn">EDITAR</button>
    </div>
  </div>
</div>

<div id="keybind-modal">
  <div id="keybind-panel">
    <h2>CONTROLES</h2>
    <div id="keybind-rows"></div>
    <div id="keybind-conflict"></div>
    <button id="keybind-close">CERRAR</button>
  </div>
</div>

<div id="overlay"></div>

<script>
// ─── Audio ───────────────────────────────────────────────────────────────────
let audioCtx = null;
let masterGain = null;
let musicMuted = false;
let loopTimeout = null;
let musicStarted = false;
let activeOscillators = [];

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;
  masterGain.connect(audioCtx.destination);
}

function playTone(freq, startTime, duration, vol = 0.2, type = 'square') {
  if (!audioCtx || freq === 0 || !masterGain) return;
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  env.gain.setValueAtTime(vol, startTime);
  env.gain.exponentialRampToValueAtTime(0.0001, startTime + duration * 0.88);
  osc.connect(env);
  env.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration);
  activeOscillators.push(osc);
  osc.onended = () => { activeOscillators = activeOscillators.filter(o => o !== osc); };
}

function stopAllOscillators() {
  activeOscillators.forEach(osc => { try { osc.stop(0); } catch(e) {} });
  activeOscillators = [];
}

// Note table
const N = {
  C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,
  R:0,
};

const BPM = 160;
const B = 60 / BPM;

// Tetris Theme A — Korobeiniki (La menor / A minor)
// [frecuencia, beats]
const MELODY = [
  // ── Frase 1 ─────────────────────────────────────────────────────────────
  [N.E5,1],
  [N.B4,0.5],[N.C5,0.5],
  [N.D5,1],
  [N.C5,0.5],[N.B4,0.5],
  [N.A4,1],
  [N.A4,0.5],[N.C5,0.5],
  [N.E5,1],
  [N.D5,0.5],[N.C5,0.5],
  [N.B4,1.5],[N.C5,0.5],
  [N.D5,1],[N.E5,1],
  [N.C5,1],[N.A4,1],
  [N.A4,2],
  // ── Frase 2 ─────────────────────────────────────────────────────────────
  [N.R,0.5],
  [N.D5,1],[N.F5,0.5],
  [N.A5,1],
  [N.G5,0.5],[N.F5,0.5],
  [N.E5,1.5],[N.C5,0.5],
  [N.E5,1],
  [N.D5,0.5],[N.C5,0.5],
  [N.B4,1],
  [N.B4,0.5],[N.C5,0.5],
  [N.D5,1],[N.E5,1],
  [N.C5,1],[N.A4,1],
  [N.A4,2],
  // ── Parte B ─────────────────────────────────────────────────────────────
  [N.E5,2],[N.C5,2],
  [N.D5,2],[N.B4,2],
  [N.C5,2],[N.A4,2],
  [N.A4,1],[N.B4,1],[N.C5,2],
  [N.D5,2],[N.F5,2],
  [N.E5,2],[N.C5,2],
  [N.D5,2],[N.B4,2],
  [N.A4,4],
];

// Bajo en La menor (Am - F - C - G - Am - Dm - E - Am)
const BASS_PATTERN = [
  N.A3,N.E3, N.A3,N.E3,   // Am
  N.F3,N.C3, N.F3,N.C3,   // F
  N.C3,N.G3, N.C3,N.G3,   // C
  N.G3,N.D3, N.G3,N.D3,   // G
  N.A3,N.E3, N.A3,N.E3,   // Am
  N.D3,N.A3, N.D3,N.A3,   // Dm
  N.E3,N.B3, N.E3,N.B3,   // E
  N.A3,N.E3, N.A3,N.E3,   // Am
];

function scheduleAnthem() {
  if (!audioCtx || musicMuted) return;
  const now = audioCtx.currentTime + 0.05;

  // Melody
  let t = now;
  MELODY.forEach(([freq, beats]) => {
    playTone(freq, t, beats * B * 0.85, 0.22, 'square');
    t += beats * B;
  });
  const totalDur = t - now;

  // Bass
  let bt = now;
  let bi = 0;
  while (bt < now + totalDur) {
    playTone(BASS_PATTERN[bi % BASS_PATTERN.length], bt, B * 1.7, 0.12, 'triangle');
    bt += B * 2;
    bi++;
  }

  loopTimeout = setTimeout(scheduleAnthem, (totalDur - 0.3) * 1000);
}

function startMusic() {
  if (!audioCtx || musicMuted || musicStarted) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  musicStarted = true;
  scheduleAnthem();
}

function stopMusic() {
  if (loopTimeout) { clearTimeout(loopTimeout); loopTimeout = null; }
  musicStarted = false;
}

function toggleMusic() {
  ensureAudio();
  musicMuted = !musicMuted;
  const btn = document.getElementById('music-btn');
  if (musicMuted) {
    stopMusic();             // cancela el setTimeout del loop
    stopAllOscillators();   // mata todos los osciladores ya programados
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    btn.textContent = '🔇 MÚSICA';
    btn.classList.add('muted');
  } else {
    stopAllOscillators();   // limpia cualquier resto antes de arrancar
    stopMusic();
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    btn.textContent = '🔊 MÚSICA';
    btn.classList.remove('muted');
    musicStarted = false;
    startMusic();
  }
}

function tryStartMusic() {
  if (musicStarted || musicMuted) return;
  ensureAudio();
  startMusic();
}

// SFX
function sfxLineClear(cleared) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (cleared === 4) {
    // Tetris: mini fanfare ascendente
    [[N.C5,0],[N.E5,0.08],[N.G5,0.16],[N.C5,0.08],[N.E5,0.24]].forEach(([f,d]) => {
      playTone(f, t + d, 0.18, 0.35, 'square');
    });
  } else {
    // Barrido hacia arriba
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(280 + cleared * 80, t);
    osc.frequency.exponentialRampToValueAtTime(560 + cleared * 120, t + 0.14);
    env.gain.setValueAtTime(0.18, t);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    osc.connect(env); env.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.18);
  }
}

function sfxGameOver() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [N.C5,N.B4,N.A4,N.G4,N.F4,N.E4,N.D4,N.C4].forEach((f, i) => {
    playTone(f, t + i * 0.1, 0.12, 0.25, 'square');
  });
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function keyLabel(k) {

  return map[k] ?? (k.length === 1 ? k.toUpperCase() : k);
}

// ─── Grid ────────────────────────────────────────────────────────────────────
function createGrid() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
}

function buildPrefilledGrid(filledRows) {
  const g = createGrid();
  for (let r = ROWS - 1; r >= ROWS - filledRows; r--) {
    const gap = Math.floor(Math.random() * COLS);
    for (let c = 0; c < COLS; c++)
      g[r][c] = c === gap ? 0 : Math.floor(Math.random() * 7) + 1;
  }
  return g;
}

function pushGarbageLine(count = 1) {
  for (let n = 0; n < count; n++) {
    grid.shift();
    // Boss garbage has 2 gaps making it harder to clear
    const gaps = new Set();
    while (gaps.size < 2) gaps.add(Math.floor(Math.random() * COLS));
    const line = Array.from({ length: COLS }, (_, c) =>
      gaps.has(c) ? 0 : Math.floor(Math.random() * 7) + 1
    );
    grid.push(line);
  }
  if (collides(piece, grid)) {
    piece.y = Math.max(0, piece.y - count);
    if (collides(piece, grid)) endGame();
  }
}

// ─── Pieces ──────────────────────────────────────────────────────────────────
function randomPiece() {
  const type = Math.floor(Math.random() * 7) + 1;
  const shape = SHAPES[type].map(row => [...row]);
  return { type, shape, x: Math.floor((COLS - shape[0].length) / 2), y: 0 };
}

function rotate(shape) {
  const N = shape.length, M = shape[0].length;
  const result = Array.from({ length: M }, () => Array(N).fill(0));
  for (let r = 0; r < N; r++)
    for (let c = 0; c < M; c++)
      result[c][N - 1 - r] = shape[r][c];
  return result;
}

function collides(p, g, dx = 0, dy = 0, shape = p.shape) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const nx = p.x + c + dx, ny = p.y + r + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && g[ny][nx]) return true;
    }
  return false;
}

// ─── Game logic ──────────────────────────────────────────────────────────────
function lock() {
  for (let r = 0; r < piece.shape.length; r++)
    for (let c = 0; c < piece.shape[r].length; c++) {
      if (!piece.shape[r][c]) continue;
      const ny = piece.y + r;
      if (ny < 0) { endGame(); return; }
      grid[ny][piece.x + c] = piece.type;
    }
  clearLines();
  piece = nextPiece;
  nextPiece = randomPiece();
  drawNext();
  canHold = true;
  document.getElementById('hold-box').classList.remove('blocked');
  if (collides(piece, grid)) endGame();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(v => v !== 0)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
      cleared++; r++;
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    if (gameMode === 'free') dropInterval = Math.max(100, 1000 - (level - 1) * 90);
    updateUI();

    // Visual flash + SFX
    clearFlash = {
      alpha: cleared === 4 ? 0.7 : 0.45,
      color: cleared === 4 ? '#f0d000' : '#ffffff',
      ts: performance.now(),
    };
    sfxLineClear(cleared);

    if (gameMode === 'story') checkChallenge(cleared);
    if (gameMode === 'boss')  dealBossDamage(cleared);
  } else if (gameMode === 'story') {
    checkChallenge(0);
  }
}

function checkChallenge(clearedNow) {
  const ch = CHAPTERS[currentChapter.diff][currentChapter.idx].challenge;

  if (ch.type === 'lines' || ch.type === 'lines_timed') {
    const pct = Math.min(lines / ch.target, 1);
    updateChallengeUI(`${lines} / ${ch.target}`, pct);
    if (lines >= ch.target) chapterComplete();
  }
  else if (ch.type === 'score' || ch.type === 'score_timed') {
    const pct = Math.min(score / ch.target, 1);
    updateChallengeUI(`${score} / ${ch.target}`, pct);
    if (score >= ch.target) chapterComplete();
  }
  else if (ch.type === 'tetris') {
    if (clearedNow === 4) challengeState.tetrisCount++;
    const pct = Math.min(challengeState.tetrisCount / ch.target, 1);
    updateChallengeUI(`${challengeState.tetrisCount} / ${ch.target}`, pct);
    if (challengeState.tetrisCount >= ch.target) chapterComplete();
  }
}

function dealBossDamage(cleared) {
  // 1→1, 2→2, 3→4, 4→6 (bonus for tetris)
  const dmg = [0, 1, 2, 4, 6][Math.min(cleared, 4)];
  bossState.hp = Math.max(0, bossState.hp - dmg);
  updateBossUI();
  if (bossState.hp <= 0) bossVictory();
}

function updateChallengeUI(text, pct) {

function updateBossUI() {

  document.getElementById('challenge-progress-text').textContent = `HP: ${bossState.hp} / ${bossState.maxHp}`;

// ─── Drawing ─────────────────────────────────────────────────────────────────
function drawBlock(context, x, y, type, alpha = 1) {
  if (!type) return;
  context.globalAlpha = alpha;
  context.fillStyle = COLORS[type];
  context.fillRect(x*BLOCK+1, y*BLOCK+1, BLOCK-2, BLOCK-2);
  context.fillStyle = 'rgba(255,255,255,0.3)';
  context.fillRect(x*BLOCK+1, y*BLOCK+1, BLOCK-2, 4);
  context.fillRect(x*BLOCK+1, y*BLOCK+1, 4, BLOCK-2);
  context.fillStyle = 'rgba(0,0,0,0.2)';
  context.fillRect(x*BLOCK+1, y*BLOCK+BLOCK-5, BLOCK-2, 4);
  context.globalAlpha = 1;
}

function getGhost() {
  let dy = 0;
  while (!collides(piece, grid, 0, dy + 1)) dy++;
  return { ...piece, y: piece.y + dy };
}

function draw() {
  ctx.clearRect(0, 0, board.width, board.height);
  ctx.strokeStyle = '#ffffff08'; ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r*BLOCK); ctx.lineTo(COLS*BLOCK, r*BLOCK); ctx.stroke(); }
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*BLOCK, 0); ctx.lineTo(c*BLOCK, ROWS*BLOCK); ctx.stroke(); }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      drawBlock(ctx, c, r, grid[r][c]);

  const showGhost = !(gameMode === 'boss' && BOSSES[bossState.idx]?.noGhost);
  if (showGhost) {
    const ghost = getGhost();
    for (let r = 0; r < ghost.shape.length; r++)
      for (let c = 0; c < ghost.shape[r].length; c++)
        if (ghost.shape[r][c]) drawBlock(ctx, ghost.x+c, ghost.y+r, piece.type, 0.2);
  }

  for (let r = 0; r < piece.shape.length; r++)
    for (let c = 0; c < piece.shape[r].length; c++)
      if (piece.shape[r][c]) drawBlock(ctx, piece.x+c, piece.y+r, piece.type);

  if (clearFlash && clearFlash.alpha > 0) {
    ctx.fillStyle = clearFlash.color;
    ctx.globalAlpha = clearFlash.alpha;
    ctx.fillRect(0, 0, board.width, board.height);
    ctx.globalAlpha = 1;
  }
}

function drawPieceInCanvas(context, p) {
  context.clearRect(0, 0, 120, 120);
  if (!p) return;
  const s = p.shape, bw = 24;
  const ox = Math.floor((5 - s[0].length) / 2);
  const oy = Math.floor((5 - s.length) / 2);
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[r].length; c++)
      if (s[r][c]) {
        context.fillStyle = COLORS[p.type];
        context.fillRect((ox+c)*bw+1, (oy+r)*bw+1, bw-2, bw-2);
        context.fillStyle = 'rgba(255,255,255,0.3)';
        context.fillRect((ox+c)*bw+1, (oy+r)*bw+1, bw-2, 3);
        context.fillRect((ox+c)*bw+1, (oy+r)*bw+1, 3, bw-2);
      }
}

function drawNext() { drawPieceInCanvas(nCtx, nextPiece); }

// ─── Hold ────────────────────────────────────────────────────────────────────
function holdCurrentPiece() {
  if (!canHold) return;
  canHold = false;
  document.getElementById('hold-box').classList.add('blocked');
  const savedType = piece.type;
  if (holdPiece) {
    piece = { ...holdPiece, x: Math.floor((COLS - holdPiece.shape[0].length) / 2), y: 0 };
  } else {
    piece = nextPiece;
    nextPiece = randomPiece();
    drawPieceInCanvas(nCtx, nextPiece);
  }
  holdPiece = { type: savedType, shape: SHAPES[savedType].map(row => [...row]) };
  drawPieceInCanvas(hCtx, holdPiece);
  draw();
}

// ─── Game loop ───────────────────────────────────────────────────────────────
function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const delta = ts - lastTime;

  // Fade line-clear flash
  if (clearFlash) {
    clearFlash.alpha = Math.max(0, clearFlash.alpha - 0.06);
    if (clearFlash.alpha <= 0) clearFlash = null;
  }

  if (!paused && delta >= dropInterval) {
    lastTime = ts;
    if (!collides(piece, grid, 0, 1)) piece.y++;
    else lock();
  }

  if (gameMode === 'story' && !paused && !gameOver) {
    const ch = CHAPTERS[currentChapter.diff][currentChapter.idx].challenge;
    const elapsed = (ts - challengeState.startTs) / 1000;

    if (ch.type === 'survive') {
      const rem = Math.max(0, ch.timeLimit - elapsed);
      document.getElementById('challenge-timer').textContent = fmtTime(rem);
      updateChallengeUI(fmtTime(rem), Math.min(elapsed / ch.timeLimit, 1));
      if (elapsed >= ch.timeLimit) { chapterComplete(); return; }
    } else if (ch.type === 'lines_timed' || ch.type === 'score_timed') {
      const rem = Math.max(0, ch.timeLimit - elapsed);
      document.getElementById('challenge-timer').textContent = fmtTime(rem);
      if (elapsed >= ch.timeLimit) { chapterFailed(); return; }
    }
  }

  if (gameMode === 'boss' && !paused && !gameOver) {
    const boss = BOSSES[bossState.idx];
    const elapsed = ts - bossState.lastAttackTs;
    const rem = Math.max(0, boss.attackInterval - elapsed);
    const remSec = rem / 1000;

    const warningEl = document.getElementById('boss-attack-warning');
    if (remSec <= 3) {
      warningEl.textContent = '⚠ ¡ATAQUE INMINENTE!';
      warningEl.classList.add('active');
    } else {
      warningEl.textContent = '';
      warningEl.classList.remove('active');
    }

    document.getElementById('challenge-timer').textContent =
      remSec <= 3 ? `${Math.ceil(remSec)}` : `Ataque en ${fmtTime(remSec)}`;

    if (elapsed >= boss.attackInterval && !gameOver) {
      bossState.lastAttackTs = ts;
      bossState.attackCount = (bossState.attackCount || 0) + 1;
      pushGarbageLine(boss.garbageLines);
      if (boss.speedEscalation) {
        dropInterval = Math.max(150, dropInterval - 25);
      }
    }
  }

  draw();
  if (!gameOver) animFrame = requestAnimationFrame(gameLoop);
}

function fmtTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ─── Start / End ─────────────────────────────────────────────────────────────
function resetGameState(prefilledRows = 0) {
  grid = prefilledRows ? buildPrefilledGrid(prefilledRows) : createGrid();
  score = 0; level = 1; lines = 0;
  paused = false; gameOver = false; lastTime = 0;
  holdPiece = null; canHold = true;
  piece = randomPiece();
  nextPiece = randomPiece();
  updateUI();
  drawNext();
  drawPieceInCanvas(hCtx, null);
  document.getElementById('hold-box').classList.remove('blocked');
}

function startFreeGame() {
  gameMode = 'free';
  dropInterval = 1000;
  document.getElementById('challenge-box').classList.remove('visible');
  document.getElementById('challenge-box').classList.remove('boss-mode');
  document.getElementById('challenge-box-label').textContent = 'Reto';
  document.getElementById('level-box').style.display = '';
  resetGameState();
  hideOverlay();
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(gameLoop);
}

function startChapter(diff, idx) {
  gameMode = 'story';
  currentChapter = { diff, idx };
  const ch = CHAPTERS[diff][idx];
  dropInterval = ch.speed;
  challengeState = { tetrisCount: 0, startTs: performance.now() };

  document.getElementById('level-box').style.display = 'none';
  const box = document.getElementById('challenge-box');
  box.classList.add('visible');
  box.classList.remove('boss-mode');
  document.getElementById('challenge-box-label').textContent = 'Reto';
  document.getElementById('challenge-title').textContent = ch.title;
  document.getElementById('challenge-obj').textContent = ch.objectiveText;
  document.getElementById('challenge-timer').textContent = '';
  document.getElementById('boss-attack-warning').textContent = '';
  updateChallengeUI('0', 0);

  resetGameState(ch.prefilled || 0);
  challengeState.startTs = performance.now();
  hideOverlay();
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(gameLoop);
}

function startBoss(idx) {
  gameMode = 'boss';
  const boss = BOSSES[idx];
  dropInterval = boss.speed;
  bossState = {
    idx,
    hp: boss.hp,
    maxHp: boss.hp,
    lastAttackTs: 0,
    attackCount: 0,
  };

  document.getElementById('level-box').style.display = 'none';
  const box = document.getElementById('challenge-box');
  box.classList.add('visible');
  box.classList.add('boss-mode');
  document.getElementById('challenge-box-label').textContent = 'Jefe';
  document.getElementById('challenge-title').textContent = boss.name;
  document.getElementById('challenge-obj').textContent = boss.subtitle;
  document.getElementById('challenge-timer').textContent = '';
  document.getElementById('boss-attack-warning').textContent = '';
  updateBossUI();

  resetGameState();
  bossState.lastAttackTs = performance.now();
  hideOverlay();
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(gameLoop);
}

function endGame() {
  gameOver = true;
  updateBestScore(score);
  sfxGameOver();
  if (gameMode === 'story') {
    chapterFailed();
  } else if (gameMode === 'boss') {
    bossDefeated();
  } else {
    showOverlay(`
      <h2>GAME OVER</h2>
      <div id="final-score">Puntuación: ${score}</div>
      <p>Nivel ${level} &nbsp;|&nbsp; Líneas: ${lines}</p>
      <button class="ov-btn" id="btn-retry">JUGAR DE NUEVO</button>
      <button class="ov-btn secondary" id="btn-menu">MENÚ</button>
    `, el => {
      el.querySelector('#btn-retry').onclick = startFreeGame;
      el.querySelector('#btn-menu').onclick = showMainMenu;
    });
  }
}

function nextChapterOf(diff, idx) {
  const chapters = CHAPTERS[diff];
  if (idx + 1 < chapters.length) return { diff, idx: idx + 1 };
  const nextDiffIdx = DIFFS.indexOf(diff) + 1;
  if (nextDiffIdx < DIFFS.length) return { diff: DIFFS[nextDiffIdx], idx: 0 };
  return null;
}

function chapterComplete() {
  gameOver = true;
  updateBestScore(score);
  const { diff, idx } = currentChapter;
  if (!storyProgress[diff]) storyProgress[diff] = [];
  storyProgress[diff][idx] = true;
  saveProgress();

  const next = nextChapterOf(diff, idx);
  const color = DIFF_COLORS[diff];
  showOverlay(`
    <div class="result-icon">⭐</div>
    <h2>¡COMPLETADO!</h2>
    <p style="color:${color};font-size:0.75rem;letter-spacing:0.2em">${DIFF_LABELS[diff].toUpperCase()} · ${CHAPTERS[diff][idx].title.toUpperCase()}</p>
    <div class="result-stats">Puntos: <span>${score}</span><br>Líneas: <span>${lines}</span></div>
    ${next ? `<button class="ov-btn" id="btn-next">SIGUIENTE RETO</button>` : '<p style="color:#f0a000">¡Has completado todos los retos!</p>'}
    <button class="ov-btn secondary" id="btn-chapters">VER RETOS</button>
  `, el => {
    if (next) el.querySelector('#btn-next').onclick = () => showChapterIntro(next.diff, next.idx);
    el.querySelector('#btn-chapters').onclick = showChapterSelect;
  });
}

function chapterFailed() {
  gameOver = true;
  const { diff, idx } = currentChapter;
  const color = DIFF_COLORS[diff];
  showOverlay(`
    <div class="result-icon">💀</div>
    <h2>FALLIDO</h2>
    <p style="color:${color};font-size:0.75rem;letter-spacing:0.2em">${DIFF_LABELS[diff].toUpperCase()} · ${CHAPTERS[diff][idx].title.toUpperCase()}</p>
    <div class="result-stats">Puntos: <span>${score}</span><br>Líneas: <span>${lines}</span></div>
    <button class="ov-btn" id="btn-retry">REINTENTAR</button>
    <button class="ov-btn secondary" id="btn-chapters">VER RETOS</button>
  `, el => {
    el.querySelector('#btn-retry').onclick = () => showChapterIntro(diff, idx);
    el.querySelector('#btn-chapters').onclick = showChapterSelect;
  });
}

function bossVictory() {
  gameOver = true;
  updateBestScore(score);
  const idx = bossState.idx;
  bossProgress[idx] = true;
  saveBossProgress();

  const boss = BOSSES[idx];
  const nextIdx = idx + 1 < BOSSES.length ? idx + 1 : null;
  showOverlay(`
    <div class="result-icon">🏆</div>
    <h2 style="color:#f0a000">¡VICTORIA!</h2>
    <p style="color:#e94560;font-size:0.75rem;letter-spacing:0.2em">JEFE DERROTADO · ${boss.name.toUpperCase()}</p>
    <div class="result-stats">
      Puntos: <span>${score}</span><br>
      Líneas: <span>${lines}</span><br>
      Ataques del jefe: <span>${bossState.attackCount}</span>
    </div>
    ${nextIdx !== null && bossUnlocked(nextIdx)
      ? `<button class="ov-btn" id="btn-next">SIGUIENTE JEFE</button>`
      : nextIdx !== null
        ? `<p style="color:#888;font-size:0.75rem">Siguiente jefe desbloqueado</p>`
        : `<p style="color:#f0a000">¡Has derrotado a todos los jefes!</p>`
    }
    <button class="ov-btn secondary" id="btn-bosses">VER JEFES</button>
  `, el => {
    if (nextIdx !== null && bossUnlocked(nextIdx))
      el.querySelector('#btn-next').onclick = () => showBossIntro(nextIdx);
    el.querySelector('#btn-bosses').onclick = showBossSelect;
  });
}

function bossDefeated() {
  gameOver = true;
  const idx = bossState.idx;
  const boss = BOSSES[idx];
  showOverlay(`
    <div class="result-icon">💀</div>
    <h2>DERROTADO</h2>
    <p style="color:#e94560;font-size:0.75rem;letter-spacing:0.2em">${boss.icon} ${boss.name.toUpperCase()}</p>
    <div class="result-stats">
      Puntos: <span>${score}</span><br>
      HP restante del jefe: <span>${bossState.hp} / ${bossState.maxHp}</span>
    </div>
    <button class="ov-btn" id="btn-retry">VOLVER A INTENTARLO</button>
    <button class="ov-btn secondary" id="btn-bosses">VER JEFES</button>
  `, el => {
    el.querySelector('#btn-retry').onclick = () => showBossIntro(idx);
    el.querySelector('#btn-bosses').onclick = showBossSelect;
  });
}

// ─── Overlay screens ─────────────────────────────────────────────────────────
function showOverlay(html, onReady) {
  const el = document.getElementById('overlay');
  el.innerHTML = html;
  el.style.display = 'flex';
  el.addEventListener('click', tryStartMusic, { once: true });
  if (onReady) onReady(el);
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function showMainMenu() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  gameOver = true;
  const done = totalCompleted(storyProgress);
  const bossDone = bossProgress.filter(Boolean).length;
  showOverlay(`
    <h2>TETRIS</h2>
    <p style="color:#e94560;font-size:0.8rem;letter-spacing:0.15em">👤 ${activeProfile}</p>
    <button class="ov-btn" id="btn-free">MODO LIBRE</button>
    <button class="ov-btn secondary" id="btn-story">RETOS ${done > 0 ? `(${done}/${TOTAL_CHAPTERS})` : ''}</button>
    <button class="ov-btn secondary" id="btn-boss">MODO HISTORIA ${bossDone > 0 ? `(${bossDone}/${BOSSES.length})` : ''}</button>
    <button class="ov-btn secondary" id="btn-change">CAMBIAR JUGADOR</button>
  `, el => {
    el.querySelector('#btn-free').onclick = startFreeGame;
    el.querySelector('#btn-story').onclick = showChapterSelect;
    el.querySelector('#btn-boss').onclick = showBossSelect;
    el.querySelector('#btn-change').onclick = showProfileSelect;
  });
}

function showChapterSelect() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  gameOver = true;

  const sections = DIFFS.map(diff => {
    const chapters = CHAPTERS[diff];
    const unlocked = diffUnlocked(diff);
    const doneCount = chapters.filter((_, i) => storyProgress[diff]?.[i]).length;

    const cards = chapters.map((ch, i) => {
      const done = !!storyProgress[diff]?.[i];
      const locked = !unlocked || (i > 0 && !storyProgress[diff]?.[i - 1]);
      const cls = `${diff} ${locked ? 'locked' : done ? 'completed' : ''}`;
      return `
        <div class="chapter-card ${cls}" data-diff="${diff}" data-idx="${i}">
          <div class="chapter-num">${done ? '✓' : i + 1}</div>
          <div class="chapter-info">
            <div class="ch-title">${ch.title}</div>
            <div class="ch-obj">${ch.objectiveText}</div>
          </div>
          <div class="chapter-badge">${done ? '⭐' : locked ? '🔒' : ''}</div>
        </div>
      `;
    }).join('');

    const lockNote = !unlocked
      ? ` — completa ${DIFF_LABELS[DIFFS[DIFFS.indexOf(diff)-1]]} primero`
      : '';

    return `
      <div class="diff-section">
        <div class="diff-header ${diff} ${!unlocked ? 'locked-section' : ''}">
          ${DIFF_LABELS[diff]}${lockNote}
          <span class="diff-badge">${doneCount}/${chapters.length}</span>
        </div>
        ${cards}
      </div>
    `;
  }).join('');

  showOverlay(`
    <h2 style="font-size:1.5rem">RETOS</h2>
    <div id="chapter-scroll">${sections}</div>
    <button class="ov-btn secondary" id="btn-back">← VOLVER</button>
  `, el => {
    el.querySelector('#btn-back').onclick = showMainMenu;
    el.querySelectorAll('.chapter-card:not(.locked)').forEach(card => {
      card.addEventListener('click', () =>
        showChapterIntro(card.dataset.diff, +card.dataset.idx)
      );
    });
  });
}

function showChapterIntro(diff, idx) {
  const ch = CHAPTERS[diff][idx];
  const narrativeHtml = ch.narrative.replace(/\n/g, '<br>');
  showOverlay(`
    <div class="diff-pill ${diff}">${DIFF_LABELS[diff]}</div>
    <div id="chapter-intro-title">${ch.title}</div>
    <p id="chapter-intro-narrative">${narrativeHtml}</p>
    <div class="objective-badge">🎯 ${ch.objectiveText}</div>
    <button class="ov-btn" id="btn-play">JUGAR</button>
    <button class="ov-btn secondary" id="btn-back">← RETOS</button>
  `, el => {
    el.querySelector('#btn-play').onclick = () => startChapter(diff, idx);
    el.querySelector('#btn-back').onclick = showChapterSelect;
  });
}

function showBossSelect() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  gameOver = true;

  const cards = BOSSES.map((boss, i) => {
    const done = !!bossProgress[i];
    const locked = !bossUnlocked(i);
    return `
      <div class="boss-card ${locked ? 'locked' : done ? 'completed' : ''}" data-idx="${i}">
        <div class="boss-icon">${locked ? '🔒' : boss.icon}</div>
        <div class="boss-info">
          <div class="b-name">${boss.name}</div>
          <div class="b-subtitle">${boss.subtitle}</div>
          <div class="b-mechanic">${boss.mechanic}</div>
        </div>
        <div class="boss-badge">
          ${done ? '🏆' : !locked ? `<div class="boss-hp-preview">❤ ${boss.hp}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  showOverlay(`
    <h2 style="font-size:1.5rem">MODO HISTORIA</h2>
    <p style="color:#666;font-size:0.75rem;text-align:center;max-width:300px">Derrota a los jefes limpiando líneas.<br>Cada Tetris hace más daño.</p>
    <div id="chapter-scroll" style="width:340px">${cards}</div>
    <button class="ov-btn secondary" id="btn-back">← VOLVER</button>
  `, el => {
    el.querySelector('#btn-back').onclick = showMainMenu;
    el.querySelectorAll('.boss-card:not(.locked)').forEach(card => {
      card.addEventListener('click', () => showBossIntro(+card.dataset.idx));
    });
  });
}

function showBossIntro(idx) {
  const boss = BOSSES[idx];
  const narrativeHtml = boss.narrative.replace(/\n/g, '<br>');
  const tags = [
    `❤ HP: ${boss.hp}`,
    boss.noGhost ? '👻 Sin fantasma' : null,
    `⚡ Ataca cada ${boss.attackInterval / 1000}s`,
    boss.speedEscalation ? '📈 Se acelera' : null,
  ].filter(Boolean).join(' &nbsp;·&nbsp; ');

  showOverlay(`
    <div class="diff-pill boss">JEFE FINAL</div>
    <div id="chapter-intro-title">${boss.icon} ${boss.name}</div>
    <p style="color:#666;font-size:0.8rem;letter-spacing:0.1em">${boss.subtitle}</p>
    <p id="chapter-intro-narrative">${narrativeHtml}</p>
    <div class="boss-stats-badge">${tags}</div>
    <button class="ov-btn" id="btn-play">COMBATIR</button>
    <button class="ov-btn secondary" id="btn-back">← JEFES</button>
  `, el => {
    el.querySelector('#btn-play').onclick = () => startBoss(idx);
    el.querySelector('#btn-back').onclick = showBossSelect;
  });
}

// ─── Profile screens ─────────────────────────────────────────────────────────
function showProfileSelect() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  gameOver = true;

  const names = Object.keys(profiles);
  const cards = names.length === 0
    ? `<p style="color:#555;font-size:0.8rem">No hay perfiles aún.</p>`
    : names.map(name => {
        const d = profiles[name];
        const sp = Array.isArray(d.storyProgress) ? EMPTY_PROGRESS() : (d.storyProgress || EMPTY_PROGRESS());
        const done = totalCompleted(sp);
        const bossDone = (d.bossProgress || []).filter(Boolean).length;
        return `
          <div class="profile-card" data-name="${name}">
            <div class="profile-avatar">${name[0].toUpperCase()}</div>
            <div class="profile-info">
              <div class="p-name">${name}</div>
              <div class="p-stats">Retos: ${done}/${TOTAL_CHAPTERS} &nbsp;·&nbsp; Jefes: ${bossDone}/${BOSSES.length} &nbsp;·&nbsp; Récord: ${d.bestScore || 0}</div>
            </div>
            <button class="profile-delete" data-del="${name}" title="Eliminar">✕</button>
          </div>
        `;
      }).join('');

  showOverlay(`
    <h2 style="font-size:1.5rem">JUGADORES</h2>
    <div id="profile-list">${cards}</div>
    <button class="ov-btn" id="btn-new-profile">+ NUEVO JUGADOR</button>
    ${activeProfile ? `<button class="ov-btn secondary" id="btn-back">← VOLVER</button>` : ''}
  `, el => {
    el.querySelectorAll('.profile-card').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.closest('.profile-delete')) return;
        selectProfile(card.dataset.name);
      });
    });
    el.querySelectorAll('.profile-delete').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); deleteProfile(btn.dataset.del); });
    });
    el.querySelector('#btn-new-profile').onclick = showNewProfile;
    if (activeProfile) el.querySelector('#btn-back').onclick = showMainMenu;
  });
}

function showNewProfile() {
  showOverlay(`
    <h2 style="font-size:1.5rem">NUEVO JUGADOR</h2>
    <p>¿Cómo te llamas?</p>
    <input class="name-input" id="profile-name-input" maxlength="16" placeholder="Tu nombre" autocomplete="off" />
    <div class="input-error" id="profile-name-error"></div>
    <button class="ov-btn" id="btn-create">CREAR</button>
    <button class="ov-btn secondary" id="btn-back">← VOLVER</button>
  `, el => {
    const input = el.querySelector('#profile-name-input');
    const error = el.querySelector('#profile-name-error');
    input.focus();
    const create = () => {
      const name = input.value.trim();
      if (!name) { error.textContent = 'Escribe un nombre.'; return; }
      if (profiles[name]) { error.textContent = 'Ya existe ese nombre.'; return; }
      profiles[name] = { storyProgress: EMPTY_PROGRESS(), bossProgress: [], bestScore: 0 };
      saveProfiles();
      selectProfile(name);
    };
    el.querySelector('#btn-create').onclick = create;
    input.addEventListener('keydown', e => { if (e.key === 'Enter') create(); });
    el.querySelector('#btn-back').onclick = showProfileSelect;
  });
}

function selectProfile(name) {
  setActiveProfile(name);
  const d = currentProfileData();
  const sp = d.storyProgress;
  storyProgress = Array.isArray(sp) ? EMPTY_PROGRESS() : { easy: [...(sp.easy||[])], medium: [...(sp.medium||[])], hard: [...(sp.hard||[])] };
  bossProgress = [...(d.bossProgress || [])];
  showMainMenu();
}

function deleteProfile(name) {
  delete profiles[name];
  saveProfiles();
  if (activeProfile === name) {
    activeProfile = null;
    localStorage.removeItem('tetrisActiveProfile');
  }
  showProfileSelect();
}

// ─── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  tryStartMusic();
  if (gameOver) return;
  const k = e.key;
  const is = a => k === bindings[a] || k === bindings[a].toUpperCase();

  if (is('pause')) {
    paused = !paused;
    if (!paused) { lastTime = 0; animFrame = requestAnimationFrame(gameLoop); }
    return;
  }
  if (paused) return;

  if      (is('left'))     { if (!collides(piece, grid, -1, 0)) piece.x--; }
  else if (is('right'))    { if (!collides(piece, grid,  1, 0)) piece.x++; }
  else if (is('softDrop')) {
    if (!collides(piece, grid, 0, 1)) piece.y++; else lock();
    lastTime = performance.now();
  }
  else if (is('rotate')) {
    const rot = rotate(piece.shape);
    for (const kick of [0, 1, -1, 2, -2]) {
      if (!collides(piece, grid, kick, 0, rot)) { piece.shape = rot; piece.x += kick; break; }
    }
  }
  else if (k === bindings.hardDrop) {
    e.preventDefault();
    while (!collides(piece, grid, 0, 1)) piece.y++;
    lock(); lastTime = performance.now();
  }
  else if (is('hold')) { holdCurrentPiece(); }
  else return;

  draw();
});

// ─── Keybind modal ───────────────────────────────────────────────────────────
let listeningAction = null;

function openKeybindModal() {
  if (!gameOver) paused = true;
  renderKeybindModal();
  document.getElementById('keybind-modal').classList.add('open');
}

function closeKeybindModal() {
  listeningAction = null;
  document.getElementById('keybind-modal').classList.remove('open');
  document.getElementById('keybind-conflict').textContent = '';
  renderControls();
  if (!gameOver) { paused = false; lastTime = 0; animFrame = requestAnimationFrame(gameLoop); }
}

function renderKeybindModal() {
  const container = document.getElementById('keybind-rows');
  container.innerHTML = ACTIONS.map(a => `
    <div class="keybind-row">
      <span class="action-name">${a.label}</span>
      <button class="keybind-btn" data-action="${a.id}">${keyLabel(bindings[a.id])}</button>
    </div>
  `).join('');
  container.querySelectorAll('.keybind-btn').forEach(btn =>
    btn.addEventListener('click', () => startListening(btn.dataset.action))
  );
}

function startListening(actionId) {
  listeningAction = actionId;
  document.getElementById('keybind-conflict').textContent = '';
  document.querySelectorAll('.keybind-btn').forEach(b => {
    b.classList.toggle('listening', b.dataset.action === actionId);
    b.textContent = b.dataset.action === actionId ? '...' : keyLabel(bindings[b.dataset.action]);
  });
}

function cancelListening() { listeningAction = null; renderKeybindModal(); }

document.addEventListener('keydown', e => {
  if (!listeningAction) return;
  e.preventDefault();
  const k = e.key;
  if (k === 'Escape') { cancelListening(); return; }
  const conflict = ACTIONS.find(a => a.id !== listeningAction && bindings[a.id] === k);
  if (conflict) {
    document.getElementById('keybind-conflict').textContent = `"${keyLabel(k)}" ya está en "${conflict.label}"`;
    cancelListening(); return;
  }
  bindings[listeningAction] = k;
  listeningAction = null;
  document.getElementById('keybind-conflict').textContent = '';
  renderKeybindModal();
});

document.getElementById('edit-controls-btn').addEventListener('click', openKeybindModal);
document.getElementById('keybind-close').addEventListener('click', closeKeybindModal);
document.getElementById('music-btn').addEventListener('click', () => { toggleMusic(); tryStartMusic(); });

// ─── Init ────────────────────────────────────────────────────────────────────
document.getElementById('player-box').addEventListener('click', () => {
  if (!gameOver) paused = true;
  showProfileSelect();
});

renderControls();

if (activeProfile && profiles[activeProfile]) {
  selectProfile(activeProfile);
} else {
  activeProfile = null;
  showProfileSelect();
}
</script>
